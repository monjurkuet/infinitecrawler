name: "Google Maps Listing Crawler (Working Config)"
content_type: "listing_crawler"

browser:
  automation: "nodriver"
  headless: true
  page_wait_seconds: 1.0

input:
  strategy: "postgresql_uncrawled_gmaps"
  config:
    database: "infinitecrawler"
    schema: "scraper"
    search_results_table: "gmaps_search_results"
    listings_table: "gmaps_listings"
    source_url_field: "source_url"
    batch_size: 1000

queue:
  strategy: "redis_queue"
  config:
    host: "localhost"
    port: 6379
    db: 0
    ignore_completed_on_enqueue: true
    keys:
      pending: "gmaps:pending"
      processing: "gmaps:processing"
      completed: "gmaps:completed"
      failed: "gmaps:failed"
    visibility_timeout: 300

navigation:
  strategy: "tab_navigator"
  config:
    tabs:
      - name: "Overview"
        selector: '[role="tab"][aria-label^="Overview"]'
        required: true
        wait_for_selector: "div[role='main']"
        max_wait: 5

      - name: "Reviews"
        selector: '[role="tab"][aria-label^="Reviews"]'
        wait_for_selector: "div[role='main']"
        max_wait: 4

      - name: "About"
        selector: '[role="tab"][aria-label^="About"]'
        wait_for_selector: "div[role='region']"
        max_wait: 3

extraction:
  strategy: "multi_step"
  config:
    steps:
      - action: "extract"
        fields:
          name:
            selector: "h1.DUwDvf"
            type: "text"
          rating:
            selector: "div.F7nice span.ceNzKf[aria-label*='stars']"
            selectors:
              - "div.F7nice span.ceNzKf[aria-label*='stars']"
              - "div.F7nice [aria-label*='stars']"
              - "div.F7nice [aria-label*='star']"
              - "div.F7nice [role='img']"
              - "div.F7nice span[aria-hidden='true']"
              - "div.F7nice"
            type: "attribute"
            attribute: "aria-label"
            regex: "([0-9.]+)"
            retry:
              attempts: 1
              delay: 0.2
          review_count:
            selector: 'div.F7nice span[role="img"][aria-label*="reviews"]'
            selectors:
              - 'div.F7nice span[role="img"][aria-label*="reviews"]'
              - 'div.F7nice [aria-label*="reviews"]'
              - 'div.F7nice [aria-label*="review"]'
              - 'div.F7nice [role="img"]'
              - 'div.F7nice'
            type: "attribute"
            attribute: "aria-label"
            regex: "([\\d,]+)"
            retry: false
      - action: "transform"
        field: "review_count"
        operation: "remove_commas"

      - action: "extract"
        fields:
          address:
            selector: 'button[data-item-id="address"] .Io6YTe'
            selectors:
              - 'button[data-item-id="address"] .Io6YTe'
              - 'button[data-item-id="address"]'
              - '[data-item-id="address"] .Io6YTe'
            type: "text"
            transform: "clean_address"
          phone:
            selector: 'button[data-item-id^="phone"] .Io6YTe'
            selectors:
              - 'button[data-item-id^="phone"] .Io6YTe'
              - 'button[data-item-id^="phone"]'
              - '[data-item-id^="phone"] .Io6YTe'
            type: "text"
            transform: "clean_phone"
            retry: false
          website:
            selector: 'a[data-item-id="authority"]'
            selectors:
              - 'a[data-item-id="authority"]'
              - 'a[aria-label*="Website"]'
            type: "attribute"
            attribute: "href"
            retry: false
          plus_code:
            selector: 'button[data-item-id="oloc"] .Io6YTe'
            selectors:
              - 'button[data-item-id="oloc"] .Io6YTe'
              - 'button[data-item-id="oloc"]'
            type: "text"
            transform: "clean_plus_code"
            retry: false
          category:
            selector: 'button[jsaction*="category"]'
            selectors:
              - 'button[jsaction*="category"]'
              - 'button[aria-label*="Category"]'
            type: "text"
            retry: false
          is_claimed:
            selector: 'a[href*="claim"]'
            type: "exists"
            retry: false
          booking_url:
            selector: 'a[href*="calendly.com"]'
            selectors:
              - 'a[href*="calendly.com"]'
              - 'a[href*="appointy.com"]'
              - 'a[href*="/book"]'
              - 'a[href*="scheduling"]'
              - 'a[href*="appointment"]'
            type: "attribute"
            attribute: "href"
            retry: false

      - action: "extract_url"
        fields:
          latitude:
            pattern: "!3d(-?[0-9.]+)"
          longitude:
            pattern: "!4d(-?[0-9.]+)"
          place_id:
            pattern: "1s([A-Za-z0-9_-]+)"

  # Element-level retry configuration
  retry:
    enabled: true
    attempts: 3
    delay: 2
    backoff: "exponential"

  # Timeout configuration
  timeouts:
    page_load: 2
    element: 1

output:
  strategy: "postgresql_listing_upsert"
  config:
    database: "infinitecrawler"
    schema: "scraper"
    table: "gmaps_listings"
    key_field: "place_id"
    source_type: "gmaps_listing"
    max_results: 100000
    recreate_table: false

rate_limiting:
  page_load:
    - 0.5
    - 1.0
  between_requests:
    - 1
    - 2
  between_tabs:
    - 0.3
    - 0.8
  distribution: "random"
  max_retries: 3
  retry_delay:
    - 30
    - 60

# URL-level retry configuration
retry:
  url_attempts: 3
  delay: 5
  restart_browser: true

workers:
  count: 3
  max_consecutive_errors: 5
  max_pages_per_session: 100
