name: Google Maps Listing Crawler (Working Config)
content_type: listing_crawler
browser:
  automation: pinchtab
  headless: true
  page_wait_seconds: 15.0
pinchtab:
  server_url: "http://127.0.0.1:9867"
  instance_url: "http://127.0.0.1:9868"
  token: "123456"
  navigate_timeout: 90
queue:
  strategy: redis_queue
  config:
    host: localhost
    port: 6379
    db: 0
    ignore_completed_on_enqueue: true
    keys:
      pending: gmaps:pending
      processing: gmaps:processing
      completed: gmaps:completed
      failed: gmaps:failed
    visibility_timeout: 300
navigation:
  strategy: tab_navigator
  config:
    tabs:
    - name: Overview
      selector: '[role="tab"][aria-label^="Overview"]'
      required: true
      wait_for_selector: div[role='main']
      max_wait: 5
    - name: Reviews
      selector: '[role="tab"][aria-label^="Reviews"]'
      wait_for_selector: div[role='main']
      max_wait: 4
    - name: About
      selector: '[role="tab"][aria-label^="About"]'
      wait_for_selector: div[role='region']
      max_wait: 3
extraction:
  strategy: multi_step
  config:
    steps:
    - action: extract
      fields:
        name:
          selector: .qBF1Pd.fontHeadlineSmall
          selectors:
          - .qBF1Pd.fontHeadlineSmall
          - h1.DUwDvf
          type: text
        rating:
          selector: .e4rVHe.fontBodyMedium span[role="img"].ZkP5Je
          selectors:
          - .e4rVHe.fontBodyMedium span[role="img"].ZkP5Je
          - div.F7nice span.ceNzKf[aria-label*='stars']
          - div.F7nice [aria-label*='stars']
          - div.F7nice [role='img']
          type: attribute
          attribute: aria-label
          regex: ([0-9.]+)
        review_count:
          selector: .e4rVHe.fontBodyMedium span[role="img"].ZkP5Je
          selectors:
          - .e4rVHe.fontBodyMedium span[role="img"].ZkP5Je
          - div.F7nice span[role="img"][aria-label*="reviews"]
          - div.F7nice [aria-label*="reviews"]
          - div.F7nice [role="img"]
          type: attribute
          attribute: aria-label
          regex: ([\d,]+)\s*
    - action: transform
      field: review_count
      operation: remove_commas
    - action: extract
      fields:
        phone:
          selector: .UsdlK
          selectors:
          - .UsdlK
          - button[data-item-id^="phone"] .Io6YTe
          - button[data-item-id^="phone"]
          type: text
          transform: clean_phone
        website:
          selector: a.lcr4fd.S9kvJb[data-value="Website"]
          selectors:
          - a.lcr4fd.S9kvJb[data-value="Website"]
          - a[data-item-id="authority"]
          - a[aria-label*="Website"]
          type: attribute
          attribute: href
        address:
          selector: .W4Efsd .W4Efsd
          selectors:
          - .W4Efsd .W4Efsd
          - button[data-item-id="address"] .Io6YTe
          - button[data-item-id="address"]
          type: text
        category:
          selector: .W4Efsd span:first-child
          selectors:
          - .W4Efsd span:first-child
          - button[jsaction*="category"]
          - button[aria-label*="Category"]
          type: text
        plus_code:
          selector: .W4Efsd .W4Efsd:last-child
          selectors:
          - .W4Efsd .W4Efsd:last-child
          - button[data-item-id="oloc"] .Io6YTe
          type: text
    - action: extract_url
      fields:
        latitude:
          pattern: '!3d(-?[0-9.]+)'
        longitude:
          pattern: '!4d(-?[0-9.]+)'
        place_id:
          pattern: 1s([A-Za-z0-9_-]+)
  retry:
    enabled: true
    attempts: 3
    delay: 2
    backoff: exponential
  timeouts:
    page_load: 30
    element: 1
output:
  strategy: postgresql_listing_upsert
  config:
    host: 127.0.0.1
    port: 5432
    user: postgres
    password: changeme
    database: infinitecrawler
    schema: scraper
    table: gmaps_listings
    key_field: place_id
    source_type: gmaps_listing
    max_results: 100000
    recreate_table: false
rate_limiting:
  page_load:
  - 0.5
  - 1.0
  between_requests:
  - 1
  - 2
  between_tabs:
  - 0.3
  - 0.8
  distribution: random
  max_retries: 3
  retry_delay:
  - 30
  - 60
retry:
  url_attempts: 3
  delay: 5
  restart_browser: true
workers:
  count: 3
  max_consecutive_errors: 15
  max_pages_per_session: 100
