name: "Google Maps Listing Crawler (Working Config)"
content_type: "listing_crawler"

browser:
  automation: "nodriver"
  headless: true

input:
  strategy: "file_url_loader"
  config:
    file_path: "output/gmaps_urls.txt"
    deduplicate: true
    batch_size: 1000

queue:
  strategy: "redis_queue"
  config:
    host: "localhost"
    port: 6379
    db: 0
    keys:
      pending: "gmaps:pending"
      processing: "gmaps:processing"
      completed: "gmaps:completed"
      failed: "gmaps:failed"
    visibility_timeout: 300

navigation:
  strategy: "tab_navigator"
  config:
    tabs:
      - name: "overview"
        selector: '[role="tab"][aria-selected="true"]'
        required: true
        wait_for_selector: "div[role='main']"
        max_wait: 5

      - name: "about"
        selector: '[role="tab"]:nth-of-type(2)'
        wait_for_selector: "div[role='region']"
        max_wait: 3

      - name: "reviews"
        selector: '[role="tab"]:nth-of-type(3)'
        max_wait: 3

extraction:
  strategy: "multi_step"
  config:
    steps:
      - action: "extract"
        fields:
          name:
            selector: "h1"
            type: "text"
          rating:
            selector: "span.ceNzKf[aria-label*='stars']"
            selectors:
              - "span.ceNzKf[aria-label*='stars']"
              - "img[alt*='stars']"
              - "div.F7nice"
            type: "attribute"
            attribute: "aria-label"
            regex: "([0-9.]+)"
          review_count:
            selector: '[aria-label*="reviews"]'
            selectors:
              - '[aria-label*="reviews"]'
              - 'button[aria-label*="review"]'
            type: "attribute"
            attribute: "aria-label"
            regex: "^(\\d+)"

      - action: "extract"
        fields:
          address:
            selector: 'button[data-item-id="address"]'
            selectors:
              - 'button[data-item-id="address"]'
              - '[data-item-id*="address"]'
            type: "text"
            transform: "clean_address"
          phone:
            selector: 'button[data-item-id^="phone"]'
            selectors:
              - 'button[data-item-id^="phone"]'
              - '[data-item-id*="phone"]'
            type: "text"
            transform: "clean_phone"
          website:
            selector: 'a[data-tooltip="Open website"]'
            type: "attribute"
            attribute: "href"
          plus_code:
            selector: 'button[data-item-id="oloc"]'
            type: "text"
            transform: "clean_plus_code"
          category:
            selector: "button"
            type: "text"
          is_claimed:
            selector: 'a[href*="claim"]'
            type: "exists"
          booking_url:
            selector: 'a[href*="calendly.com"]'
            selectors:
              - 'a[href*="calendly.com"]'
              - 'a[href*="appointy.com"]'
              - 'a[href*="/book"]'
              - 'a[href*="scheduling"]'
              - 'a[href*="appointment"]'
            type: "attribute"
            attribute: "href"

      - action: "extract_url"
        fields:
          latitude:
            pattern: "!3d(-?[0-9.]+)"
          longitude:
            pattern: "!4d(-?[0-9.]+)"
          place_id:
            pattern: "1s([A-Za-z0-9_-]+)"

  # Element-level retry configuration
  retry:
    enabled: true
    attempts: 3
    delay: 2
    backoff: "exponential"

  # Timeout configuration
  timeouts:
    page_load: 10
    element: 5

output:
  strategy: "jsonl_file"
  config:
    file_path: "output/gmaps_listings_extracted.jsonl"
    max_results: 100000

secondary_output:
  strategy: "mongodb"
  config:
    uri: "mongodb://localhost:27017"
    database: "scraping"
    collection: "gmaps_listings"
    max_results: 100000

rate_limiting:
  between_requests:
    - 8
    - 15
  between_tabs:
    - 1
    - 3
  distribution: "random"
  max_retries: 3
  retry_delay:
    - 30
    - 60

# URL-level retry configuration
retry:
  url_attempts: 3
  delay: 5
  restart_browser: true

workers:
  count: 3
  max_consecutive_errors: 5
  max_pages_per_session: 100
