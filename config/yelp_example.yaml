name: "Yelp Example"
content_type: "dynamic"
browser_automation: "nodriver"
headless: true
pagination_strategy: "next_button"
extraction_strategy: "generic_selector"
output_strategy: "jsonl_file"

search_url_template: "https://www.yelp.com/search?find_desc={query}&find_loc=New+York,+NY"

selectors:
  items: ".businessName__09f24__EYSZE"
  fields:
    name: "text"
    source_url: "href"

pagination:
  next_button_selector: ".next-link"
  max_pages: 10

output:
  file_path: "output/yelp_{query}.jsonl"
  max_results: 100

rate_limit: 3
proxy_rotation: false